<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDF6EC"/>
      <stop offset="100%" stop-color="#F5E6C8"/>
    </radialGradient>
    <linearGradient id="potG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4734A"/>
      <stop offset="100%" stop-color="#9E4A2A"/>
    </linearGradient>
    <linearGradient id="lidG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C4623A"/>
      <stop offset="100%" stop-color="#A85228"/>
    </linearGradient>
    <linearGradient id="steamG" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#C4623A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C4623A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wheatG" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#C4623A"/>
      <stop offset="100%" stop-color="#D4734A"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2D2010" flood-opacity="0.12"/>
    </filter>
    <filter id="sf">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="192" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Thin border ring -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="#C4623A" stroke-width="1" opacity="0.25"/>

  <!-- ══ STEAM (3 wisps) ══ -->
  <path d="M174 104 Q169 93 174 82 Q179 71 174 60" fill="none" stroke="url(#steamG)" stroke-width="3" stroke-linecap="round" filter="url(#sf)"/>
  <path d="M200 98 Q195 86 200 74 Q205 62 200 50" fill="none" stroke="url(#steamG)" stroke-width="3.5" stroke-linecap="round" filter="url(#sf)"/>
  <path d="M226 104 Q231 93 226 82 Q221 71 226 60" fill="none" stroke="url(#steamG)" stroke-width="3" stroke-linecap="round" filter="url(#sf)"/>

  <!-- ══ POT ══ -->
  <!-- Body -->
  <rect x="140" y="118" width="120" height="76" rx="16" fill="url(#potG)"/>
  <!-- Subtle shine -->
  <path d="M156 126 Q200 118 244 126" fill="none" stroke="#E07050" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Lid -->
  <ellipse cx="200" cy="118" rx="66" ry="10" fill="url(#lidG)"/>
  <ellipse cx="200" cy="115" rx="66" ry="10" fill="url(#lidG)"/>
  <!-- Knob -->
  <rect x="193" y="104" width="14" height="12" rx="7" fill="#C4623A"/>
  <rect x="195" y="103" width="10" height="8" rx="5" fill="#D4734A"/>

  <!-- Handles -->
  <path d="M140 136 Q118 136 118 156 Q118 176 140 176" fill="none" stroke="#9E4A2A" stroke-width="9" stroke-linecap="round"/>
  <path d="M140 136 Q120 136 120 156 Q120 176 140 176" fill="none" stroke="#C4623A" stroke-width="5" stroke-linecap="round"/>
  <path d="M260 136 Q282 136 282 156 Q282 176 260 176" fill="none" stroke="#9E4A2A" stroke-width="9" stroke-linecap="round"/>
  <path d="M260 136 Q280 136 280 156 Q280 176 260 176" fill="none" stroke="#C4623A" stroke-width="5" stroke-linecap="round"/>

  <!-- ══ SUNFLOWER — left, small and clean ══ -->
  <g transform="translate(102, 168)">
    <!-- Stem -->
    <line x1="0" y1="0" x2="0" y2="48" stroke="#7A6548" stroke-width="2.5" stroke-linecap="round"/>
    <!-- One small leaf -->
    <path d="M0 28 Q-14 20 -11 10 Q-2 18 0 28Z" fill="#7A6548" opacity="0.6"/>
    <!-- 8 petals only — minimal -->
    <g>
      <g transform="rotate(0,0,0)"><ellipse cx="0" cy="-15" rx="3.5" ry="8" fill="#C4623A" opacity="0.9"/></g>
      <g transform="rotate(45,0,0)"><ellipse cx="0" cy="-15" rx="3.5" ry="8" fill="#C4623A" opacity="0.9"/></g>
      <g transform="rotate(90,0,0)"><ellipse cx="0" cy="-15" rx="3.5" ry="8" fill="#C4623A" opacity="0.9"/></g>
      <g transform="rotate(135,0,0)"><ellipse cx="0" cy="-15" rx="3.5" ry="8" fill="#C4623A" opacity="0.9"/></g>
      <g transform="rotate(180,0,0)"><ellipse cx="0" cy="-15" rx="3.5" ry="8" fill="#C4623A" opacity="0.9"/></g>
      <g transform="rotate(225,0,0)"><ellipse cx="0" cy="-15" rx="3.5" ry="8" fill="#C4623A" opacity="0.9"/></g>
      <g transform="rotate(270,0,0)"><ellipse cx="0" cy="-15" rx="3.5" ry="8" fill="#C4623A" opacity="0.9"/></g>
      <g transform="rotate(315,0,0)"><ellipse cx="0" cy="-15" rx="3.5" ry="8" fill="#C4623A" opacity="0.9"/></g>
    </g>
    <!-- Centre -->
    <circle cx="0" cy="0" r="8" fill="#2D2010"/>
    <circle cx="0" cy="0" r="5" fill="#1A1208"/>
  </g>

  <!-- ══ SUNFLOWER — right ══ -->
  <g transform="translate(298, 168)">
    <line x1="0" y1="0" x2="0" y2="48" stroke="#7A6548" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M0 28 Q14 20 11 10 Q2 18 0 28Z" fill="#7A6548" opacity="0.6"/>
    <g>
      <g transform="rotate(0,0,0)"><ellipse cx="0" cy="-15" rx="3.5" ry="8" fill="#C4623A" opacity="0.9"/></g>
      <g transform="rotate(45,0,0)"><ellipse cx="0" cy="-15" rx="3.5" ry="8" fill="#C4623A" opacity="0.9"/></g>
      <g transform="rotate(90,0,0)"><ellipse cx="0" cy="-15" rx="3.5" ry="8" fill="#C4623A" opacity="0.9"/></g>
      <g transform="rotate(135,0,0)"><ellipse cx="0" cy="-15" rx="3.5" ry="8" fill="#C4623A" opacity="0.9"/></g>
      <g transform="rotate(180,0,0)"><ellipse cx="0" cy="-15" rx="3.5" ry="8" fill="#C4623A" opacity="0.9"/></g>
      <g transform="rotate(225,0,0)"><ellipse cx="0" cy="-15" rx="3.5" ry="8" fill="#C4623A" opacity="0.9"/></g>
      <g transform="rotate(270,0,0)"><ellipse cx="0" cy="-15" rx="3.5" ry="8" fill="#C4623A" opacity="0.9"/></g>
      <g transform="rotate(315,0,0)"><ellipse cx="0" cy="-15" rx="3.5" ry="8" fill="#C4623A" opacity="0.9"/></g>
    </g>
    <circle cx="0" cy="0" r="8" fill="#2D2010"/>
    <circle cx="0" cy="0" r="5" fill="#1A1208"/>
  </g>

  <!-- ══ WHEAT EAR — left of text, tiny ══ -->
  <g transform="translate(118, 290)" opacity="0.6">
    <line x1="0" y1="22" x2="0" y2="-22" stroke="#7A6548" stroke-width="1.2"/>
    <ellipse cx="-4" cy="10" rx="3" ry="5.5" fill="#C4623A" transform="rotate(-22,-4,10)"/>
    <ellipse cx="4"  cy="10" rx="3" ry="5.5" fill="#C4623A" transform="rotate(22,4,10)"/>
    <ellipse cx="-4" cy="-2" rx="3" ry="5.5" fill="#C4623A" transform="rotate(-18,-4,-2)"/>
    <ellipse cx="4"  cy="-2" rx="3" ry="5.5" fill="#C4623A" transform="rotate(18,4,-2)"/>
    <ellipse cx="0"  cy="-16" rx="3" ry="6"  fill="#C4623A"/>
  </g>

  <!-- Wheat ear — right of text -->
  <g transform="translate(282, 290)" opacity="0.6">
    <line x1="0" y1="22" x2="0" y2="-22" stroke="#7A6548" stroke-width="1.2"/>
    <ellipse cx="-4" cy="10" rx="3" ry="5.5" fill="#C4623A" transform="rotate(-22,-4,10)"/>
    <ellipse cx="4"  cy="10" rx="3" ry="5.5" fill="#C4623A" transform="rotate(22,4,10)"/>
    <ellipse cx="-4" cy="-2" rx="3" ry="5.5" fill="#C4623A" transform="rotate(-18,-4,-2)"/>
    <ellipse cx="4"  cy="-2" rx="3" ry="5.5" fill="#C4623A" transform="rotate(18,4,-2)"/>
    <ellipse cx="0"  cy="-16" rx="3" ry="6"  fill="#C4623A"/>
  </g>

  <!-- ══ DIVIDER LINE ══ -->
  <line x1="68" y1="243" x2="332" y2="243" stroke="#C4623A" stroke-width="1" opacity="0.3"/>

  <!-- ══ VYSHYVANKA STRIPE — two hair-thin lines, blue + warm gold ══ -->
  <!-- Just two clean colour lines, very restrained -->
  <line x1="68" y1="246" x2="332" y2="246" stroke="#2D6DB5" stroke-width="1.8" opacity="0.45"/>
  <line x1="68" y1="249" x2="332" y2="249" stroke="#D4A843" stroke-width="1.8" opacity="0.45"/>

  <!-- ══ TEXT ══ -->
  <text
    x="200" y="285"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="54"
    font-weight="700"
    fill="#1A1208"
    text-anchor="middle"
    letter-spacing="7">MAMA</text>

  <text
    x="200" y="322"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="38"
    font-weight="400"
    fill="#C4623A"
    text-anchor="middle"
    letter-spacing="13">COOKIN</text>

  <!-- ══ TAGLINE ══ -->
  <text
    x="200" y="350"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="10"
    fill="#7A6548"
    text-anchor="middle"
    letter-spacing="3.5">HOME FOOD · DELIVERED FRESH</text>

</svg>
